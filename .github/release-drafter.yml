name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
categories:
  - title: "🚀 Features"
    labels:
      - enhancement
      - feature
  - title: "🐛 Bug Fixes"
    labels:
      - bug
  - title: "🧰 Maintenance"
    labels:
      - chore
      - refactor
template: |
  ## What's Changed

  $CHANGES

  ---

  _This release was automatically generated by Release Drafter._
