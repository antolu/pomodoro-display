name: "Docker login helper"
description: "Logs into a container registry using docker/login-action"
runs:
  using: "composite"
  steps:
    - name: Login to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

inputs:
  registry:
    description: 'Registry URL'
    required: true
    default: 'docker.io'
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password'
    required: true
