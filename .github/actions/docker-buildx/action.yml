name: "Docker Buildx helper"
description: "Sets up QEMU and Buildx and provides a helper build step as a composite action"
runs:
  using: "composite"
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image (composite helper)
      shell: bash
      run: |
        # Expects environment variables: IMAGE_TAR, PLATFORMS, CONTEXT
        IMAGE_TAR=${IMAGE_TAR:-image-${GITHUB_REF_NAME}.tar}
        PLATFORMS=${PLATFORMS:-linux/amd64}
        CONTEXT=${CONTEXT:-.}
        echo "Building ${IMAGE_TAR} for ${PLATFORMS} from ${CONTEXT}"
        docker buildx build --platform "${PLATFORMS}" --output type=oci,dest="${IMAGE_TAR}" "${CONTEXT}"
        echo "image_tar=${IMAGE_TAR}" >> $GITHUB_OUTPUT
