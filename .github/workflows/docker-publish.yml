name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

env:
  REGISTRY: docker.io
  IMAGE_NAME: antonlu/pomodoro-display

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for setuptools-scm versioning

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: antonlu
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Validate release tag
        id: validate_tag
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_TAG="${RAW_TAG#v}"
          VERSION_TAG="${VERSION_TAG#V}"

          if [[ ! "${RAW_TAG}" =~ ^([[:alnum:]_-]+-)?[vV]?[0-9]+(\.[0-9]+){0,2}[^+]*(\+.*)?$ ]]; then
            echo "Invalid tag: ${RAW_TAG}"
            echo "Expected a setuptools-scm compatible tag"
            echo "Examples: v0.1, v1.2.3, 1.2.3-rc1, myproject-v1.0.0, v1.2.3+build.5"
            exit 1
          fi

          echo "Validated release tag: ${RAW_TAG}"
          echo "Version for image tags: ${VERSION_TAG}"
          echo "version_tag=${VERSION_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.validate_tag.outputs.version_tag }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
