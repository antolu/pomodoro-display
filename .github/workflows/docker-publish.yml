name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.
  workflow_run:
    workflows: ["Build Docker image (CI)"]
    types: [completed]

env:
  REGISTRY: docker.io
  IMAGE_NAME: antonlu/pomodoro-display

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for setuptools-scm versioning

      - name: Docker buildx setup
        uses: ./.github/actions/docker-buildx
        with: {}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: antonlu
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Download and load image artifact
        id: load_image
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Fetching artifacts for run $RUN_ID"
          ARTIFACTS_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts"
          ART_URL=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "$ARTIFACTS_URL" | jq -r '.artifacts[] | select(.name | startswith("docker-image-")) | .archive_download_url' | head -n1)
          if [ -z "$ART_URL" ] || [ "$ART_URL" = "null" ]; then
            echo "No docker-image artifact found for run $RUN_ID"
            exit 1
          fi
          echo "Downloading artifact from $ART_URL"
          curl -L -H "Authorization: token ${GITHUB_TOKEN}" -o artifact.zip "$ART_URL"
          unzip -o artifact.zip
          TARFILE=$(ls image-*.tar | head -n1)
          if [ -z "$TARFILE" ]; then
            echo "No image tar found in artifact"
            exit 1
          fi
          echo "Found image tar: $TARFILE"
          # Load the image and capture output to determine loaded image name
          LOAD_OUTPUT=$(docker load -i "$TARFILE" 2>&1 || true)
          echo "$LOAD_OUTPUT"
          LOADED_IMAGE=$(echo "$LOAD_OUTPUT" | sed -n 's/Loaded image: //p' | head -n1)
          if [ -z "$LOADED_IMAGE" ]; then
            # Fallback: pick the most recently created image
            LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -n1)
          fi
          echo "Identified loaded image: $LOADED_IMAGE"
          echo "loaded_image=$LOADED_IMAGE" >> $GITHUB_OUTPUT

      - name: Get version via setuptools_scm
        id: get_version
        uses: ./.github/actions/get-version

      - name: Retag and push image
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          LOADED_IMAGE=${{ steps.load_image.outputs.loaded_image }}
          VERSION_TAG=${{ steps.get_version.outputs.version }}
          echo "Retagging $LOADED_IMAGE to ${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}"
          docker tag "$LOADED_IMAGE" "${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}"
          docker push "${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}"
          echo "Docker image pushed: ${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}"

      - name: Validate release tag
        id: validate_tag
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_TAG="${RAW_TAG#v}"
          VERSION_TAG="${VERSION_TAG#V}"

          if [[ ! "${RAW_TAG}" =~ ^([[:alnum:]_-]+-)?[vV]?[0-9]+(\.[0-9]+){0,2}[^+]*(\+.*)?$ ]]; then
            echo "Invalid tag: ${RAW_TAG}"
            echo "Expected a setuptools-scm compatible tag"
            echo "Examples: v0.1, v1.2.3, 1.2.3-rc1, myproject-v1.0.0, v1.2.3+build.5"
            exit 1
          fi

          echo "Validated release tag: ${RAW_TAG}"
          echo "Version for image tags: ${VERSION_TAG}"
          echo "version_tag=${VERSION_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.validate_tag.outputs.version_tag }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
