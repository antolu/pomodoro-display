name: Build Docker image (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    tags:
      - 'v*'

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version (for tag pushes)
        id: get_version
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/get-version

      - name: Build image as OCI archive (single-platform for speed)
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          REF_INPUT: ${{ github.ref_name }}
        run: |
          # If a version was determined (tag push), use it; otherwise use the ref name
          if [ -n "${VERSION}" ]; then
            REF_NAME="${VERSION}"
          else
            REF_NAME="${REF_INPUT}"
          fi
          IMAGE_TAR=image-${REF_NAME}.tar
          docker buildx build --platform linux/amd64 --output type=oci,dest=${IMAGE_TAR} .
          ls -lh ${IMAGE_TAR}
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ env.VERSION || github.ref_name }}
          path: image-${{ env.VERSION || github.ref_name }}.tar
          retention-days: 30
