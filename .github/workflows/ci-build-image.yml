name: Build Docker image (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    tags:
      - 'v*'

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker buildx setup
        uses: ./.github/actions/docker-buildx
        id: docker_buildx_setup
        with: {}
      - name: Get version (for tag pushes)
        id: get_version
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/get-version

      - name: Build image as OCI archive (single-platform for speed)
        uses: ./.github/actions/docker-buildx
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          REF_INPUT: ${{ github.ref_name }}
          IMAGE_TAR: image-${{ steps.get_version.outputs.version || github.ref_name }}.tar
          PLATFORMS: linux/amd64
          CONTEXT: .

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ env.VERSION || github.ref_name }}
          path: image-${{ env.VERSION || github.ref_name }}.tar
          retention-days: 30
