<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .timer-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .glass-effect { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .pulse-active { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen timer-gradient text-white">
    <div x-data="pomodoroControl()" x-init="init()" class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-2">Pomodoro Control</h1>
            <p class="text-xl opacity-90">Focus • Break • Repeat</p>
        </div>

        <!-- Task Input -->
        <div class="glass-effect rounded-2xl p-6 mb-8">
            <div class="flex gap-3">
                <input type="text" 
                       x-model="taskInput"
                       @keyup.enter="setTask()"
                       placeholder="What are you working on?"
                       class="flex-1 px-4 py-3 bg-white bg-opacity-20 rounded-lg placeholder-white placeholder-opacity-60 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50">
                <button @click="setTask()" 
                        class="px-6 py-3 bg-white bg-opacity-25 rounded-lg font-medium hover:bg-opacity-35 transition-all">
                    Set Task
                </button>
            </div>
            <div x-show="status.current_task" class="mt-3 text-sm opacity-80">
                Current task: <span x-text="status.current_task" class="font-medium"></span>
            </div>
        </div>

        <!-- Status Display -->
        <div class="glass-effect rounded-2xl p-8 mb-8 text-center">
            <div class="mb-4">
                <span class="text-sm uppercase tracking-wider opacity-75" x-text="status.mode ? formatMode(status.mode) : 'Ready'"></span>
            </div>
            <div class="text-6xl font-bold mb-4" :class="{'pulse-active': status.active}">
                <span x-text="formatTime(status.remaining)"></span>
            </div>
            <div class="flex justify-center items-center gap-4 text-sm">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"/>
                    </svg>
                    <span x-text="'Pomodoro #' + status.pomodoro_count"></span>
                </span>
                <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full" :class="status.active ? 'bg-green-400' : 'bg-gray-400'"></div>
                    <span x-text="status.active ? 'Active' : 'Inactive'"></span>
                </span>
            </div>
        </div>

        <!-- Timer Controls -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <button @click="startTimer('pomodoro')" 
                    class="group relative overflow-hidden bg-white bg-opacity-20 glass-effect rounded-xl p-6 transition-all duration-300 hover:scale-105 btn-shadow"
                    :class="{'ring-4 ring-white ring-opacity-50': status.mode === 'pomodoro' && status.active}">
                <div class="relative z-10">
                    <div class="text-3xl mb-2">🍅</div>
                    <div class="font-semibold text-lg">Pomodoro</div>
                    <div class="text-sm opacity-75">25 minutes</div>
                </div>
                <div class="absolute inset-0 opacity-0 group-hover:opacity-30 transition-opacity" style="background: linear-gradient(to bottom right, #ba4949, #a03d3d)"></div>
            </button>

            <button @click="startTimer('short_break')" 
                    class="group relative overflow-hidden bg-white bg-opacity-20 glass-effect rounded-xl p-6 transition-all duration-300 hover:scale-105 btn-shadow"
                    :class="{'ring-4 ring-white ring-opacity-50': status.mode === 'short_break' && status.active}">
                <div class="relative z-10">
                    <div class="text-3xl mb-2">☕</div>
                    <div class="font-semibold text-lg">Short Break</div>
                    <div class="text-sm opacity-75">5 minutes</div>
                </div>
                <div class="absolute inset-0 opacity-0 group-hover:opacity-30 transition-opacity" style="background: linear-gradient(to bottom right, #38858a, #2e6b70)"></div>
            </button>

            <button @click="startTimer('long_break')" 
                    class="group relative overflow-hidden bg-white bg-opacity-20 glass-effect rounded-xl p-6 transition-all duration-300 hover:scale-105 btn-shadow"
                    :class="{'ring-4 ring-white ring-opacity-50': status.mode === 'long_break' && status.active}">
                <div class="relative z-10">
                    <div class="text-3xl mb-2">🌙</div>
                    <div class="font-semibold text-lg">Long Break</div>
                    <div class="text-sm opacity-75">15 minutes</div>
                </div>
                <div class="absolute inset-0 opacity-0 group-hover:opacity-30 transition-opacity" style="background: linear-gradient(to bottom right, #397097, #2e5a7a)"></div>
            </button>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <button @click="stopTimer()" 
                    class="px-8 py-3 bg-red-500 bg-opacity-80 rounded-full font-semibold transition-all duration-300 hover:bg-opacity-100 hover:scale-105 btn-shadow">
                <span class="flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z"/>
                    </svg>
                    Stop Timer
                </span>
            </button>

            <button x-show="status.active" @click="togglePause()" 
                    class="px-8 py-3 rounded-full font-semibold transition-all duration-300 hover:scale-105 btn-shadow"
                    :class="status.paused ? 'bg-green-500 bg-opacity-80 hover:bg-opacity-100' : 'bg-orange-500 bg-opacity-80 hover:bg-opacity-100'">
                <span class="flex items-center gap-2">
                    <!-- Pause icon -->
                    <svg x-show="!status.paused" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                    <!-- Resume/Play icon -->
                    <svg x-show="status.paused" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                    </svg>
                    <span x-text="status.paused ? 'Resume Timer' : 'Pause Timer'"></span>
                </span>
            </button>

            <button @click="toggleAuto()" 
                    class="px-8 py-3 rounded-full font-semibold transition-all duration-300 hover:scale-105 btn-shadow"
                    :class="status.auto_cycle ? 'bg-green-500 bg-opacity-80 hover:bg-opacity-100' : 'bg-gray-500 bg-opacity-80 hover:bg-opacity-100'">
                <span class="flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/>
                    </svg>
                    <span x-text="status.auto_cycle ? 'Auto-Cycle ON' : 'Auto-Cycle OFF'"></span>
                </span>
            </button>

            <button @click="resetCycle()" 
                    class="px-8 py-3 bg-yellow-500 bg-opacity-80 rounded-full font-semibold transition-all duration-300 hover:bg-opacity-100 hover:scale-105 btn-shadow">
                <span class="flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1z"/>
                    </svg>
                    Reset Cycle
                </span>
            </button>

            <button @click="toggleMute()" 
                    class="px-8 py-3 rounded-full font-semibold transition-all duration-300 hover:scale-105 btn-shadow"
                    :class="isMuted ? 'bg-red-500 bg-opacity-80 hover:bg-opacity-100' : 'bg-blue-500 bg-opacity-80 hover:bg-opacity-100'">
                <span class="flex items-center gap-2">
                    <!-- Muted icon -->
                    <svg x-show="isMuted" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM12.293 7.293a1 1 0 011.414 0L15 8.586l1.293-1.293a1 1 0 111.414 1.414L16.414 10l1.293 1.293a1 1 0 01-1.414 1.414L15 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L13.586 10l-1.293-1.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                    <!-- Unmuted icon -->
                    <svg x-show="!isMuted" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"/>
                    </svg>
                    <span x-text="isMuted ? 'Unmute Sounds' : 'Mute Sounds'"></span>
                </span>
            </button>
        </div>

        <!-- Quick Actions -->
        <div class="glass-effect rounded-2xl p-6">
            <h3 class="font-semibold mb-4 text-lg">Quick Actions</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                <div class="flex items-center justify-between p-3 bg-white bg-opacity-10 rounded-lg">
                    <span>Display Page</span>
                    <a href="/" target="_blank" class="text-cyan-300 hover:text-cyan-100 transition-colors">
                        Open →
                    </a>
                </div>
                <div class="flex items-center justify-between p-3 bg-white bg-opacity-10 rounded-lg">
                    <span>API Status</span>
                    <a href="/status" target="_blank" class="text-cyan-300 hover:text-cyan-100 transition-colors">
                        View →
                    </a>
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <div class="mt-8 text-center text-sm opacity-75">
            <p>Control via CLI: <code class="bg-white bg-opacity-20 px-2 py-1 rounded">curl http://localhost:5000/start/pomodoro?task=YourTask</code></p>
        </div>
    </div>

    <script>
        function pomodoroControl() {
            return {
                status: {
                    active: false,
                    mode: null,
                    remaining: 0,
                    total: 0,
                    auto_cycle: false,
                    pomodoro_count: 0,
                    current_task: '',
                    paused: false
                },
                taskInput: '',
                isMuted: false,
                
                init() {
                    // Load mute state from localStorage
                    this.isMuted = localStorage.getItem('pomodoroMuted') === 'true';
                    
                    this.updateStatus();
                    setInterval(() => this.updateStatus(), 1000);
                },
                
                async updateStatus() {
                    try {
                        const response = await fetch('/status');
                        this.status = await response.json();
                        if (!this.taskInput && this.status.current_task) {
                            this.taskInput = this.status.current_task;
                        }
                    } catch (error) {
                        console.error('Failed to update status:', error);
                    }
                },
                
                async startTimer(mode) {
                    try {
                        const task = this.taskInput ? `?task=${encodeURIComponent(this.taskInput)}` : '';
                        await fetch(`/start/${mode}${task}`);
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to start timer:', error);
                    }
                },
                
                async stopTimer() {
                    try {
                        await fetch('/stop');
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to stop timer:', error);
                    }
                },
                
                async toggleAuto() {
                    try {
                        await fetch('/toggle_auto');
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to toggle auto-cycle:', error);
                    }
                },
                
                async resetCycle() {
                    try {
                        await fetch('/reset_cycle');
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to reset cycle:', error);
                    }
                },
                
                async setTask() {
                    try {
                        const response = await fetch('/set_task', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ task: this.taskInput })
                        });
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to set task:', error);
                    }
                },
                
                toggleMute() {
                    this.isMuted = !this.isMuted;
                    localStorage.setItem('pomodoroMuted', this.isMuted.toString());
                },
                
                async togglePause() {
                    try {
                        await fetch('/toggle_pause');
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to toggle pause:', error);
                    }
                },
                
                formatTime(seconds) {
                    if (!seconds) return '00:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                },
                
                formatMode(mode) {
                    if (!mode) return '';
                    return mode.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
                }
            }
        }
    </script>
</body>
</html>
