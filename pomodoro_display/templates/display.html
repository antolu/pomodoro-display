<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            transition: background-color 1s ease;
        }
        
        .timer-text {
            font-size: clamp(8rem, 25vw, 20rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        
        .task-text {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 500;
        }
        
        /* Minimalist color schemes */
        .bg-pomodoro {
            background-color: #ba4949;
        }
        
        .bg-short-break {
            background-color: #38858a;
        }
        
        .bg-long-break {
            background-color: #397097;
        }
        
        .bg-idle {
            background-color: #374151; /* gray-700 */
        }
        
        /* Wavy animation only for long break */
        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-10px); }
            75% { transform: translateY(10px); }
        }
        
        .wave-animation {
            animation: wave 8s ease-in-out infinite;
        }
        
        /* Gentle fade for prompts */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* Button hover effect */
        .btn-prompt {
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-prompt:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        
        /* Hide cursor after inactivity */
        .hide-cursor {
            cursor: none;
        }
        
        /* Nyan Cat Easter Egg */
        .nyan-cat {
            position: fixed;
            top: 50%;
            left: -250px;
            z-index: 9999;
            pointer-events: none;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }
        
        .nyan-rainbow {
            width: 100vw;
            height: 60px;
            background: repeating-linear-gradient(
                90deg,
                #ff0000 0px, #ff0000 15px,
                #ff8800 15px, #ff8800 30px,
                #ffff00 30px, #ffff00 45px,
                #00ff00 45px, #00ff00 60px,
                #0088ff 60px, #0088ff 75px,
                #8800ff 75px, #8800ff 90px
            );
            position: absolute;
            right: 120px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.9;
            border-radius: 10px;
        }
        
        .nyan-gif {
            width: 120px;
            height: 80px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            position: relative;
            z-index: 2;
        }
        
        @keyframes nyanFly {
            0% {
                left: -250px;
            }
            100% {
                left: calc(100vw + 50px);
            }
        }
        
        @keyframes rainbowScroll {
            0% {
                background-position: 0px 0px;
            }
            100% {
                background-position: 90px 0px;
            }
        }
        
        @keyframes rainbowPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .nyan-flying {
            animation: nyanFly 10s linear;
        }
        
        .nyan-flying .nyan-rainbow {
            animation: rainbowScroll 0.2s linear infinite, rainbowPulse 0.8s ease-in-out infinite;
        }
    </style>
</head>
<body x-data="pomodoroDisplay()" x-init="init()" 
      :class="getBackgroundClass()"
      class="min-h-screen flex items-center justify-center text-white transition-all duration-1000">
    
    <!-- Main Container -->
    <div class="text-center px-8 py-12 w-full max-w-6xl"
         :class="{'wave-animation': status.mode === 'long_break' && status.active}">
        
        <!-- Task Title (if set) -->
        <div x-show="status.current_task" 
             class="task-text mb-8 opacity-80 font-light">
            <span x-text="status.current_task"></span>
        </div>
        
        <!-- Timer Display -->
        <div class="timer-text tabular-nums" :class="{'opacity-60': status.paused}">
            <span x-text="formatTime(status.remaining)"></span>
        </div>
        
        <!-- Paused Indicator -->
        <div x-show="status.paused" class="mt-4 text-3xl font-bold opacity-90 text-yellow-300">
            ⏸️ PAUSED
        </div>
        
        <!-- Session Type -->
        <div class="mt-8 text-4xl font-semibold tracking-wide" :class="status.paused ? 'opacity-50' : 'opacity-80'">
            <span x-text="getModeDisplay()"></span>
        </div>
        
        <!-- Session Counter -->
        <div x-show="status.pomodoro_count > 0" 
             class="mt-6 text-2xl opacity-70 font-medium">
            <span>Session <span x-text="status.pomodoro_count"></span></span>
        </div>
        
        <!-- Completion Prompt -->
        <div x-show="showPrompt" 
             class="mt-16 fade-in">
            <div class="mb-6 text-2xl font-light">
                <span x-text="getPromptMessage()"></span>
            </div>
            <div class="flex justify-center gap-4">
                <button @click="confirmNext()" 
                        class="btn-prompt px-8 py-4 rounded-lg text-lg font-medium">
                    <span x-text="getPromptButtonText()"></span>
                </button>
                <button @click="skipNext()" 
                        class="btn-prompt px-8 py-4 rounded-lg text-lg font-medium opacity-70">
                    Skip
                </button>
            </div>
        </div>
        
        <!-- Control Hint (bottom corner) -->
        <div class="fixed bottom-6 right-6 opacity-30 hover:opacity-60 transition-opacity text-sm">
            <a href="/control" class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.[48;42;176;630;1232t6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
                </svg>
                Control Panel
            </a>
        </div>
        
        <!-- Fullscreen Toggle (top right) -->
        <div class="fixed top-6 right-6 opacity-0 hover:opacity-60 transition-opacity cursor-pointer"
             @click="toggleFullscreen()">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
            </svg>
        </div>
    </div>
    
    <!-- Audio Notifications -->
    <!-- Pomodoro completion sound (alarm.wav) -->
    <audio id="pomodoroCompleteSound" preload="auto">
        <source src="/static/alarm.wav" type="audio/wav">
    </audio>
    
    <!-- Break completion sound (break.wav) -->
    <audio id="breakCompleteSound" preload="auto">
        <source src="/static/break.wav" type="audio/wav">
    </audio>

    <!-- Nyan Cat Easter Egg -->
    <div x-show="showNyanCat" class="nyan-cat" :class="{'nyan-flying': nyanFlying}">
        <div class="nyan-rainbow"></div>
        <img src="https://www.nyan.cat/cats/original.gif" 
             alt="Nyan Cat" 
             class="nyan-gif"
             onerror="this.style.display='none'">
    </div>

    <script>
        function pomodoroDisplay() {
            return {
                status: {
                    active: false,
                    mode: null,
                    remaining: 0,
                    total: 0,
                    auto_cycle: false,
                    pomodoro_count: 0,
                    current_task: '',
                    just_completed: false,
                    paused: false
                },
                showPrompt: false,
                lastRemaining: null,
                previousMode: null,
                isMuted: false,
                showNyanCat: false,
                nyanFlying: false,
                konamiCode: [
                    'ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
                    'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight',
                    'KeyB', 'KeyA'
                ],
                konamiIndex: 0,
                secretWord: 'NYANCAT',
                typedSequence: '',
                
                init() {
                    // Load mute state from localStorage
                    this.isMuted = localStorage.getItem('pomodoroMuted') === 'true';
                    
                    this.updateStatus();
                    setInterval(() => this.updateStatus(), 1000);
                    
                    // Listen for mute state changes from control panel
                    window.addEventListener('storage', (e) => {
                        if (e.key === 'pomodoroMuted') {
                            this.isMuted = e.newValue === 'true';
                        }
                    });
                    
                    // Auto-hide cursor after 3 seconds of inactivity
                    let cursorTimeout;
                    document.addEventListener('mousemove', () => {
                        document.body.classList.remove('hide-cursor');
                        clearTimeout(cursorTimeout);
                        cursorTimeout = setTimeout(() => {
                            document.body.classList.add('hide-cursor');
                        }, 3000);
                    });
                    
                    // Initialize cursor as hidden
                    document.body.classList.add('hide-cursor');
                    
                    // Safari-friendly click trigger (click top-left corner 5 times)
                    let cornerClicks = 0;
                    const cornerClickArea = 50; // 50px area in top-left corner
                    document.addEventListener('click', (e) => {
                        if (e.clientX < cornerClickArea && e.clientY < cornerClickArea) {
                            cornerClicks++;
                            console.log(`Corner click ${cornerClicks}/5`);
                            if (cornerClicks >= 5) {
                                this.triggerNyanCat();
                                cornerClicks = 0;
                            }
                            // Reset counter after 3 seconds of no clicks
                            setTimeout(() => { cornerClicks = 0; }, 3000);
                        }
                    });
                    
                    // Keyboard shortcuts and easter egg
                    document.addEventListener('keydown', (e) => {
                        // Check for Konami code (arrow keys)
                        if (e.code === this.konamiCode[this.konamiIndex]) {
                            this.konamiIndex++;
                            if (this.konamiIndex === this.konamiCode.length) {
                                this.triggerNyanCat();
                                this.konamiIndex = 0;
                            }
                        } else {
                            this.konamiIndex = 0;
                        }
                        
                        // Check for secret word (NYANCAT) - ignore if typing in input fields
                        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                            if (e.key.length === 1 && /[A-Za-z]/.test(e.key)) {
                                this.typedSequence += e.key.toUpperCase();
                                console.log('Typed sequence so far:', this.typedSequence); // Debug log
                                
                                // Keep only the last 7 characters
                                if (this.typedSequence.length > this.secretWord.length) {
                                    this.typedSequence = this.typedSequence.slice(-this.secretWord.length);
                                }
                                
                                // Check if we typed the secret word
                                if (this.typedSequence === this.secretWord) {
                                    console.log('Secret word detected! Triggering Nyan Cat'); // Debug log
                                    this.triggerNyanCat();
                                    this.typedSequence = '';
                                }
                            }
                        }
                        
                        // Simple alternative: Press 'N' key 3 times quickly
                        if (e.key.toLowerCase() === 'n' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                            this.nKeyCount = (this.nKeyCount || 0) + 1;
                            setTimeout(() => { this.nKeyCount = 0; }, 2000); // Reset after 2 seconds
                            if (this.nKeyCount >= 3) {
                                console.log('Triple N detected! Triggering Nyan Cat'); // Debug log
                                this.triggerNyanCat();
                                this.nKeyCount = 0;
                            }
                        }
                        
                        // Regular shortcuts
                        if (this.showPrompt) {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                this.confirmNext();
                            } else if (e.key === 'Escape') {
                                e.preventDefault();
                                this.skipNext();
                            }
                        }
                    });
                },
                
                async updateStatus() {
                    try {
                        const response = await fetch('/status');
                        const newStatus = await response.json();
                        
                        // Check if timer just completed
                        if (this.status.remaining > 0 && newStatus.remaining === 0 && newStatus.just_completed) {
                            this.onTimerComplete(this.status.mode);
                        }
                        
                        // Track mode changes to know what just completed
                        if (this.status.mode !== newStatus.mode) {
                            this.previousMode = this.status.mode;
                        }
                        
                        // Check for server-side Nyan Cat activation
                        if (newStatus.nyan_cat && newStatus.nyan_cat.active && !this.showNyanCat) {
                            console.log('🌈 Server-side Nyan Cat detected! Starting animation...');
                            this.startNyanCatAnimation();
                        }
                        
                        this.status = newStatus;
                        
                        // Show prompt when timer completes
                        if (this.status.just_completed && !this.showPrompt) {
                            this.showPrompt = true;
                        } else if (!this.status.just_completed && this.showPrompt) {
                            this.showPrompt = false;
                        }
                    } catch (error) {
                        console.error('Failed to update status:', error);
                    }
                },
                
                onTimerComplete(completedMode) {
                    // Don't play sound if muted
                    if (this.isMuted) return;
                    
                    let audioElement;
                    if (completedMode === 'pomodoro') {
                        // Pomodoro just ended - play sharp alert sound
                        audioElement = document.getElementById('pomodoroCompleteSound');
                    } else {
                        // Break just ended - play gentle welcoming sound  
                        audioElement = document.getElementById('breakCompleteSound');
                    }
                    
                    if (audioElement) {
                        audioElement.currentTime = 0; // Reset to start
                        audioElement.play().catch(e => console.log('Audio play failed:', e));
                    }
                },
                
                async confirmNext() {
                    try {
                        await fetch('/confirm_next');
                        this.showPrompt = false;
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to confirm next:', error);
                    }
                },
                
                async skipNext() {
                    try {
                        await fetch('/stop');
                        this.showPrompt = false;
                        this.updateStatus();
                    } catch (error) {
                        console.error('Failed to skip:', error);
                    }
                },
                
                formatTime(seconds) {
                    if (!seconds && seconds !== 0) return '00:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                },
                
                getModeDisplay() {
                    if (!this.status.mode) return 'Ready';
                    switch(this.status.mode) {
                        case 'pomodoro': return 'Focus Time';
                        case 'short_break': return 'Short Break';
                        case 'long_break': return 'Long Break';
                        default: return 'Ready';
                    }
                },
                
                getBackgroundClass() {
                    if (!this.status.active && !this.status.just_completed) return 'bg-idle';
                    
                    switch(this.status.mode) {
                        case 'pomodoro': return 'bg-pomodoro';
                        case 'short_break': return 'bg-short-break';
                        case 'long_break': return 'bg-long-break';
                        default: return 'bg-idle';
                    }
                },
                
                getPromptMessage() {
                    if (this.status.mode === 'pomodoro') {
                        return "Great work! Time for a break?";
                    } else {
                        return "Break's over. Ready to focus?";
                    }
                },
                
                getPromptButtonText() {
                    if (this.status.mode === 'pomodoro') {
                        const isLongBreak = this.status.pomodoro_count % 4 === 0;
                        return isLongBreak ? "Take Long Break" : "Take Short Break";
                    } else {
                        return "Start Pomodoro";
                    }
                },
                
                async triggerNyanCat() {
                    if (this.showNyanCat) return; // Prevent multiple triggers
                    
                    try {
                        // Trigger server-side Nyan Cat for cross-page synchronization
                        await fetch('/trigger_nyancat');
                        console.log('🌈 Nyan Cat triggered via server! 🐱');
                    } catch (error) {
                        console.error('Failed to trigger Nyan Cat via server:', error);
                        // Fall back to local trigger
                        this.startNyanCatAnimation();
                    }
                },
                
                startNyanCatAnimation() {
                    if (this.showNyanCat) return; // Prevent multiple triggers
                    
                    console.log('🌈 Nyan Cat animation starting! 🐱');
                    this.showNyanCat = true;
                    this.nyanFlying = true;
                    
                    // Hide after animation completes (10 seconds for longer enjoyment)
                    setTimeout(() => {
                        this.showNyanCat = false;
                        this.nyanFlying = false;
                        console.log('Nyan Cat animation finished'); // Debug log
                    }, 10000);
                },
                
                toggleFullscreen() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                }
            }
        }
    </script>
</body>
</html>
