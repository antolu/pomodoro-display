<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Orbitron', monospace; 
            overflow: hidden;
            cursor: none;
        }
        
        .timer-text {
            font-size: clamp(4rem, 20vw, 20rem);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            letter-spacing: 0.05em;
        }
        
        .mode-text {
            font-size: clamp(1.5rem, 5vw, 4rem);
            letter-spacing: 0.2em;
        }
        
        .gradient-pomodoro {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }
        
        .gradient-short-break {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a3aa 100%);
        }
        
        .gradient-long-break {
            background: linear-gradient(135deg, #6c5ce7 0%, #5f3dc4 100%);
        }
        
        .gradient-idle {
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
        }
        
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
                opacity: 1;
            }
            50% { 
                transform: scale(1.02); 
                opacity: 0.9;
            }
        }
        
        .pulse-animation {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes countdown {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
        
        .progress-ring {
            transition: stroke-dashoffset 1s linear;
        }
        
        .glow {
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            display: block;
            pointer-events: none;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }
        
        @keyframes rise {
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Fullscreen button hint */
        .fullscreen-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        
        body:hover .fullscreen-hint {
            opacity: 0.7;
        }
        
        /* Hide cursor after inactivity */
        .hide-cursor {
            cursor: none;
        }
    </style>
</head>
<body x-data="pomodoroDisplay()" x-init="init()" 
      :class="getGradientClass()"
      class="min-h-screen flex items-center justify-center text-white transition-all duration-1000">
    
    <!-- Animated Background Particles -->
    <d[48;42;176;630;1232tiv class="particles">
        <template x-for="i in 20">
            <span class="particle" 
                  :style="`left: ${Math.random() * 100}%; animation-delay: ${Math.random() * 10}s; animation-duration: ${10 + Math.random() * 10}s`">
            </span>
        </template>
    </div>

    <!-- Main Timer Display -->
    <div class="relative z-10 text-center px-4">
        <!-- Mode Indicator -->
        <div class="mode-text uppercase tracking-widest mb-8 opacity-80 float-animation">
            <span x-text="getModeDisplay()"></span>
        </div>
        
        <!-- Timer Circle and Text -->
        <div class="relative inline-block">
            <!-- Progress Ring -->
            <svg class="absolute inset-0 w-full h-full glow" style="transform: rotate(-90deg);" 
                 viewBox="0 0 400 400">
                <circle cx="200" cy="200" r="190" 
                        stroke="rgba(255, 255, 255, 0.1)" 
                        stroke-width="4" 
                        fill="none" />
                <circle cx="200" cy="200" r="190" 
                        stroke="rgba(255, 255, 255, 0.8)" 
                        stroke-width="8" 
                        fill="none"
                        class="progress-ring"
                        :stroke-dasharray="1194"
                        :stroke-dashoffset="getProgressOffset()" />
            </svg>
            
            <!-- Timer Text -->
            <div class="timer-text font-black relative z-10 px-20"
                 :class="{'pulse-animation': status.active && status.remaining > 0 && status.remaining <= 10}">
                <span x-text="formatTime(status.remaining)"></span>
            </div>
        </div>
        
        <!-- Status Indicators -->
        <div class="mt-8 flex justify-center items-center gap-6 opacity-70">
            <!-- Active Indicator -->
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full" 
                     :class="status.active ? 'bg-green-400 pulse-animation' : 'bg-gray-400'"></div>
                <span class="text-sm uppercase tracking-wider" 
                      x-text="status.active ? 'Active' : 'Idle'"></span>
            </div>
            
            <!-- Pomodoro Counter -->
            <div x-show="status.pomodoro_count > 0" class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                    <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 1 1 0 000 2H6a2 2 0 100 4h2a2 2 0 100-4h-.5a1 1 0 000-2H8a2 2 0 012 2v9a2 2 0 11-4 0V5z"/>
                </svg>
                <span class="text-sm" x-text="`Pomodoro #${status.pomodoro_count}`"></span>
            </div>
            
            <!-- Auto-cycle Indicator -->
            <div x-show="status.auto_cycle" class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/>
                </svg>
                <span class="text-sm uppercase tracking-wider">Auto</span>
            </div>
        </div>
        
        <!-- Motivational Message -->
        <div class="mt-12 text-lg opacity-60" x-show="status.active">
            <span x-text="getMotivationalMessage()"></span>
        </div>
    </div>
    
    <!-- Fullscreen Hint -->
    <div class="fullscreen-hint" @click="toggleFullscreen()">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
        </svg>
    </div>
    
    <!-- Completion Sound (silent by default) -->
    <audio id="completionSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZizQIG2m98OScTgwOUavo7blmFgU7k9n1unEiBC13yO/eizEIHWq+8+OWT" type="audio/wav">
    </audio>

    <script>
        function pomodoroDisplay() {
            return {
                status: {
                    active: false,
                    mode: null,
                    remaining: 0,
                    total: 0,
                    auto_cycle: false,
                    pomodoro_count: 0
                },
                lastRemaining: null,
                motivationalMessages: {
                    pomodoro: [
                        "Stay focused, you've got this!",
                        "Deep work in progress...",
                        "Building momentum...",
                        "Excellence is a habit.",
                        "Focus is your superpower."
                    ],
                    short_break: [
                        "Take a breath, stretch a little.",
                        "Recharge and refresh.",
                        "You earned this break!",
                        "Rest is productive too.",
                        "Quick pause, then back to greatness."
                    ],
                    long_break: [
                        "Time for a proper rest.",
                        "Go for a walk, clear your mind.",
                        "You've accomplished a lot!",
                        "Recharge for the next sprint.",
                        "Well-deserved break time."
                    ]
                },
                
                init() {
                    this.updateStatus();
                    setInterval(() => this.updateStatus(), 1000);
                    
                    // Auto-hide cursor after 3 seconds of inactivity
                    let cursorTimeout;
                    document.addEventListener('mousemove', () => {
                        document.body.classList.remove('hide-cursor');
                        clearTimeout(cursorTimeout);
                        cursorTimeout = setTimeout(() => {
                            document.body.classList.add('hide-cursor');
                        }, 3000);
                    });
                    
                    // Initialize cursor as hidden
                    document.body.classList.add('hide-cursor');
                },
                
                async updateStatus() {
                    try {
                        const response = await fetch('/status');
                        this.status = await response.json();
                        
                        // Check if timer just completed
                        if (this.lastRemaining > 0 && this.status.remaining === 0 && !this.status.active) {
                            this.onTimerComplete();
                        }
                        
                        this.lastRemaining = this.status.remaining;
                    } catch (error) {
                        console.error('Failed to update status:', error);
                    }
                },
                
                onTimerComplete() {
                    // Play completion sound
                    const audio = document.getElementById('completionSound');
                    audio.play().catch(e => console.log('Audio play failed:', e));
                    
                    // Visual notification
                    document.body.style.animation = 'pulse 0.5s ease-in-out 3';
                    setTimeout(() => {
                        document.body.style.animation = '';
                    }, 1500);
                },
                
                formatTime(seconds) {
                    if (!seconds && seconds !== 0) return '00:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                },
                
                getModeDisplay() {
                    if (!this.status.mode) return 'READY TO FOCUS';
                    return this.status.mode.replace('_', ' ').toUpperCase();
                },
                
                getGradientClass() {
                    if (!this.status.active || !this.status.mode) return 'gradient-idle';
                    
                    switch(this.status.mode) {
                        case 'pomodoro': return 'gradient-pomodoro';
                        case 'short_break': return 'gradient-short-break';
                        case 'long_break': return 'gradient-long-break';
                        default: return 'gradient-idle';
                    }
                },
                
                getProgressOffset() {
                    if (!this.status.active || !this.status.total) return 1194;
                    const progress = 1 - (this.status.remaining / this.status.total);
                    return 1194 * (1 - progress);
                },
                
                getMotivationalMessage() {
                    if (!this.status.mode || !this.motivationalMessages[this.status.mode]) return '';
                    const messages = this.motivationalMessages[this.status.mode];
                    const index = Math.floor((this.status.total - this.status.remaining) / 60) % messages.length;
                    return messages[index];
                },
                
                toggleFullscreen() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                }
            }
        }
    </script>
</body>
</html>
